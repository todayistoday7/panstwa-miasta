    var t1class = (t1lower.indexOf('ice') !== -1 || t1lower.indexOf('brise') !== -1 || t1lower.indexOf('eisbrecher') !== -1 || t1lower.indexOf('rompe') !== -1)

      : (t1lower.indexOf('integr') !== -1 || t1lower.indexOf('team') !== -1 || t1lower.indexOf('kennen') !== -1)
      ? 'game-tag integration'
      : 'game-tag';
    var tags = '<span class="game-tag">' + players + '</span>' +
               '<span class="' + t1class + '">' + tag1 + '</span>' +
               (lang_tag ? '<span class="game-tag">' + lang_tag + '</span>' : '');
    var ageBadge = age ? '<div class="game-age-badge">👶 ' + age + '</div>' : '';
    var btn = comingSoon
      ? '<span class="coming-badge">' + btnLabel + '</span>'
      : '<span class="game-card-btn">' + btnLabel + '</span>';
    return wrap_open +
      '<div class="game-card-icon">' + icon + '</div>' +
      '<div class="game-card-title">' + title + '</div>' +
      '<div class="game-card-desc">' + desc + '</div>' +
      '<div class="game-card-tags">' + tags + '</div>' +
      ageBadge +
      btn +
      wrap_close;
  }

  function applyLang(l) {
    lang = l;
    var t = T[l] || T['pl'];
    document.getElementById('hub-title').textContent = t.title;
    document.getElementById('hub-subtitle').textContent = t.subtitle;
    var backLink = document.getElementById('hub-back-link');
    if (backLink) { backLink.textContent = t.back; backLink.href = '/?lang=' + l; }
    document.querySelectorAll('.hub-lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === l);
    });
    // Update static nav bar labels + links
    var navLabels = {
      pl: { home:'Strona główna', rules:'Zasady gier',  cats:'Kategorie',  rulesHref:'/jak-grac' },
      en: { home:'Home',          rules:'Game Rules',   cats:'Categories', rulesHref:'/how-to-play' },
      de: { home:'Startseite',    rules:'Spielregeln',  cats:'Kategorien', rulesHref:'/how-to-play' },
      sv: { home:'Startsida',     rules:'Spelregler',   cats:'Kategorier', rulesHref:'/how-to-play' },
    };
    var nl = navLabels[l] || navLabels['pl'];
    var homeEl  = document.getElementById('nav-home-label');
    var rulesEl = document.getElementById('nav-rules-label');
    var catsEl  = document.getElementById('nav-cats-label');
    var homeLink  = document.getElementById('games-home-link');
    var rulesLink = document.getElementById('games-rules-link');
    if (homeEl)   homeEl.textContent  = nl.home;
    if (rulesEl)  rulesEl.textContent = nl.rules;
    if (catsEl)   catsEl.textContent  = nl.cats;
    if (homeLink) homeLink.href = '/?lang=' + l;
    if (rulesLink) rulesLink.href = nl.rulesHref;
    renderCards(l);
    history.replaceState(null, '', '/games?lang=' + l);
    if (window.hubRerenderRooms) window.hubRerenderRooms();
    if (typeof buildRulesGrid === 'function') buildRulesGrid(l);
  }

  // Build lang bar
  var bar = document.createElement('div');
  bar.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-bottom:8px;';
  LANGS.forEach(function(lng) {
    var btn = document.createElement('button');
    btn.className = 'hub-lang-btn nav-home-btn';
    btn.dataset.lang = lng.code;
    btn.textContent = lng.label;
    btn.onclick = function() { applyLang(lng.code); };
    bar.appendChild(btn);
  });
  document.querySelector('.container').insertBefore(bar, document.querySelector('.container').firstChild);

  applyLang(lang);
})();
</script>
<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  var hubSocket = io();
  var knownCodes = {};





  var LIVE_LABELS = {
    pl: { title: 'Otwarte Pokoje do Gry',  empty: 'Brak otwartych pokoi. Stwórz pierwszy!', join: 'Dołącz', private: '🔒 Prywatny', players: 'graczy', createdPrivate: 'stworzył prywatny pokój' },
    en: { title: 'Live Open Rooms',        empty: 'No open rooms right now. Create one!',  join: 'Join',   private: '🔒 Private',   players: 'players', createdPrivate: 'created a private room' },
    de: { title: 'Offene Räume live',      empty: 'Keine offenen Räume. Erstelle einen!',  join: 'Beitreten', private: '🔒 Privat', players: 'Spieler', createdPrivate: 'hat einen privaten Raum erstellt' },
    fr: { title: 'Salles ouvertes en live',empty: 'Aucune salle ouverte. Créez-en une !',  join: 'Rejoindre', private: '🔒 Privé',  players: 'joueurs', createdPrivate: 'a créé une salle privée' },
    es: { title: 'Salas abiertas en vivo', empty: 'Sin salas abiertas. ¡Crea una!',        join: 'Unirse',    private: '🔒 Privado', players: 'jugadores', createdPrivate: 'creó una sala privada' },
  };

  hubSocket.on('connect', function() {
    hubSocket.emit('hub_watch');
  });

  hubSocket.on('hub_rooms', function(rooms) {
    renderRooms(rooms);
  });

  function cardKey(room) {
    // Unique cache key combining code + player count + isPublic state
    return room.code + '|' + room.players + '|' + (room.isPublic ? '1' : '0');
  }

  function buildCardHtml(room, ll, isNew) {
    if (room.isPublic) {
      return '<div class="hub-room-card' + (isNew ? ' new-room' : '') + '" data-code="' + room.code + '">' +
        '<div class="hub-room-icon">' + room.gameIcon + '</div>' +
        '<div class="hub-room-info">' +
          '<div class="hub-room-game">' + room.gameName + '</div>' +
          '<div class="hub-room-meta">' +
            room.hostName + ' · ' +
            room.players + '/' + room.maxPlayers + ' ' + ll.players +
            (room.lang ? ' · ' + room.lang.toUpperCase() : '') +
          '</div>' +
        '</div>' +
        '<span class="hub-room-players">' + room.players + '/' + room.maxPlayers + '</span>' +
        '<div class="hub-room-code">' + room.code + '</div>' +
        '<a href="' + room.gameSlug + '?join=' + room.code + '" class="hub-room-join-btn">' + ll.join + '</a>' +
      '</div>';
    } else {
      return '<div class="hub-room-card private-room" data-code="' + room.code + '">' +
        '<div class="hub-room-icon">' + room.gameIcon + '</div>' +
        '<div class="hub-room-info">' +
          '<div class="hub-room-game">' + room.gameName + '</div>' +
          '<div class="hub-room-meta">' + room.hostMasked + ' ' + (ll.createdPrivate || 'created a private room') + '</div>' +
        '</div>' +
        '<span class="hub-room-private">' + ll.private + '</span>' +
      '</div>';
    }
  }

  function renderRooms(rooms) {
    var currentLang = (typeof lang !== 'undefined' ? lang : 'en') || 'en';
    var ll = LIVE_LABELS[currentLang] || LIVE_LABELS['en'];

    var titleEl = document.getElementById('hub-live-title-text');
    if (titleEl) titleEl.textContent = ll.title;

    var list = document.getElementById('hub-rooms-list');
    if (!list) return;

    var openRooms    = rooms.filter(function(r) { return r.isPublic; });
    var privateRooms = rooms.filter(function(r) { return !r.isPublic; });
    var allRooms     = openRooms.concat(privateRooms);

    // Empty state
    if (allRooms.length === 0) {
      list.innerHTML = '<div class="hub-empty-rooms">' + ll.empty + '</div>';
      knownCodes = {};
      return;
    }

    // Build map of incoming codes
    var incomingCodes = {};
    allRooms.forEach(function(r) { incomingCodes[r.code] = r; });

    // Remove cards for rooms that no longer exist
    var existingCards = list.querySelectorAll('[data-code]');
    existingCards.forEach(function(card) {
      var code = card.getAttribute('data-code');
      if (!incomingCodes[code]) {
        card.style.opacity = '0';
        card.style.transform = 'translateX(-8px)';
        card.style.transition = 'opacity 0.2s, transform 0.2s';
        setTimeout(function() { if (card.parentNode) card.parentNode.removeChild(card); }, 220);
        delete knownCodes[code];
      }
    });

    // Remove empty-state message if present
    var emptyMsg = list.querySelector('.hub-empty-rooms');
    if (emptyMsg) list.removeChild(emptyMsg);

    // Add or update cards
    allRooms.forEach(function(room, idx) {
      var isNew     = !knownCodes[room.code];
      var cacheKey  = cardKey(room);
      var existing  = list.querySelector('[data-code="' + room.code + '"]');

      if (!existing) {
        // New room — create and insert
        knownCodes[room.code] = cacheKey;
        var tmp = document.createElement('div');
        tmp.innerHTML = buildCardHtml(room, ll, true);
        var card = tmp.firstChild;
        // Insert in correct position
        var allCards = list.querySelectorAll('[data-code]');
        var ref = allCards[idx] || null;
        list.insertBefore(card, ref);
      } else if (knownCodes[room.code] !== cacheKey) {
        // Changed (player count etc) — update in place without removing
        knownCodes[room.code] = cacheKey;
        var tmp2 = document.createElement('div');
        tmp2.innerHTML = buildCardHtml(room, ll, false);
        var newCard = tmp2.firstChild;
        list.replaceChild(newCard, existing);
      }
      // else: identical — do nothing (no flicker!)
    });
  }

  // Re-render when language changes (hub applyLang calls this)
  function buildRulesGrid(currentLang) {
    var el = document.getElementById('hub-rules-grid');
    var titleEl = document.getElementById('hub-rules-title');
    if (!el) return;
    var ruleBase = currentLang === 'pl' ? '/jak-grac' : '/how-to-play';
    var titles = {
      pl: { label: 'Zasady gier', pm: 'Państwa-Miasta', tabu: 'Zakazane Słowa', hang: 'Wisielec', dots: 'Kropki i Kreski', tt: 'Dwie Prawdy' },
      en: { label: 'Game Rules', pm: 'Countries & Cities', tabu: 'Forbidden Words', hang: 'Hangman', dots: 'Dots & Boxes', tt: '2 Truths 1 Lie' },
      de: { label: 'Spielregeln', pm: 'Länder & Städte', tabu: 'Verbotene Wörter', hang: 'Galgenmännchen', dots: 'Punkte & Linien', tt: '2 Wahrheiten 1 Lüge' },
      sv: { label: 'Spelregler', pm: 'Länder & Städer', tabu: 'Förbjudna ord', hang: 'Hänga gubbe', dots: 'Punkter & Linjer', tt: '2 Sanningar 1 Lögn' },
    };
    var t = titles[currentLang] || titles['en'];
    if (titleEl) titleEl.textContent = t.label;
    var plBase = '/jak-grac'; var enBase = '/how-to-play';
    var games = [
      { icon: '🌍', name: t.pm,   pl: plBase,                              en: enBase },
      { icon: '🎭', name: t.tabu, pl: plBase + '/tabu',                    en: enBase + '/taboo' },
      { icon: '🪢', name: t.hang, pl: plBase + '/wisielec',                en: enBase + '/hangman' },
      { icon: '🔵', name: t.dots, pl: plBase + '/kropki-i-kreski',         en: enBase + '/dots-and-boxes' },
      { icon: '🤥', name: t.tt,   pl: plBase + '/dwie-prawdy-jedno-klamstwo', en: enBase + '/two-truths-one-lie' },
    ];
    var ll = currentLang === 'pl' ? 'pl' : 'en';
    el.innerHTML = games.map(function(g) {
      var href = ll === 'pl' ? g.pl : g.en;
      return '<a href="' + href + '" style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-decoration:none;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:700;transition:border-color 0.2s;">' +
        '<span style="font-size:20px;">' + g.icon + '</span>' +
        '<span style="color:var(--text);">📖 ' + g.name + '</span>' +
        '</a>';
    }).join('');
  }

  window.hubRerenderRooms = function() {
    hubSocket.emit('hub_watch'); // re-request to trigger re-render
  };
})();
</script>
<script src="/js/shared.js"></script>
