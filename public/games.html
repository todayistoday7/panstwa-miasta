<style>
  .hub-hero { text-align:center; padding:32px 0 24px; }
  .hub-hero h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,8vw,64px); letter-spacing:3px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:0; line-height:1; }

  .game-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:28px; text-align:center; text-decoration:none; display:block; transition:transform 0.2s, border-color 0.2s; cursor:pointer; }

  .coming-badge { display:inline-block; background:var(--surface); border:1px solid var(--border); color:var(--muted); font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:2px; }
  .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-weight:700; font-size:13px; text-decoration:none; margin-bottom:16px; }

    box-shadow: 0 0 0 0 rgba(6,214,160,0.6);
    animation: hub-pulse 2s ease-in-out infinite;
  }
  @keyframes hub-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(6,214,160,0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(6,214,160,0); }
    100% { box-shadow: 0 0 0 0 rgba(6,214,160,0); }
  }
  .hub-empty-rooms {
    color: var(--muted); font-size: 14px; font-weight: 700;
    text-align: center; padding: 24px 0; font-style: italic;
  }
  .hub-room-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .hub-room-card.new-room {
    border-color: var(--green);
    animation: hub-newroom 3s ease-out forwards;

  @keyframes hub-newroom {
    0%   { box-shadow: 0 0 0 0 rgba(6,214,160,0.5); }

  .hub-room-card.private-room { opacity: 0.65; }

  .hub-room-info { flex: 1; min-width: 0; }
  .hub-room-game { font-weight: 900; font-size: 14px; color: var(--accent); }
  .hub-room-meta { font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hub-room-players { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); letter-spacing: 2px; flex-shrink: 0; }
  .hub-room-code {

    background: var(--surface); border: 1px solid var(--border);

    .hub-room-code { display: none; }

<script>
(function() {
  var GAMES = {
    pl: {
      pm:        { desc: 'Klasyczna polska gra słowna online. Wpisuj państwa, miasta, zwierzęta i inne słowa na wylosowaną literę — szybciej niż inni!', players: '2-12 graczy', tag1: 'Wiedza', play: '🎮 Zagraj teraz', coming: 'WKRÓTCE' },
      taboo:     { desc: 'Gra drużynowa! Opisuj słowa bez zakazanych — Twoja drużyna zgaduje, sędzia przeciwników pilnuje. Min. 4 graczy.', players: '4-12 graczy', tag1: 'Drużynowa', play: '🎮 Zagraj teraz', coming: 'WKRÓTCE' },
      twotruth:  { desc: 'Powiedz dwie prawdy i jedno kłamstwo o sobie. Wszyscy głosują, które to kłamstwo!', players: '3-20 graczy', tag1: 'Integracja', play: '🎮 Zagraj teraz', coming: 'WKRÓTCE' },
      dots:      { desc: 'Klasyczna gra strategiczna! Rysuj kreski między kropkami i zamykaj pola. Gracz z największą liczbą pól wygrywa!', players: '2-4 graczy', tag1: 'Strategia', title: 'Kropki i Kreski', play: '🎮 Zagraj teraz', coming: 'WKRÓTCE' },
    },
    en: {
      pm:        { desc: 'Classic word game online. Fill in countries, cities, animals and more starting with a random letter — faster than everyone else!', players: '2-12 players', tag1: 'Knowledge', play: '🎮 Play now', coming: 'COMING SOON' },
      taboo:     { desc: 'Team game! Describe words without the forbidden ones — your team guesses, opposing referee watches. Min. 4 players.', players: '4-12 players', tag1: 'Teams', play: '🎮 Play now', coming: 'COMING SOON' },
      twotruth:  { desc: 'Say two truths and one lie about yourself. Everyone votes which one is the lie!', players: '3-20 players', tag1: 'Icebreaker', play: '🎮 Play now', coming: 'COMING SOON' },
      dots:      { desc: 'Classic grid strategy game! Draw lines between dots and claim boxes. The player with the most boxes wins! 2-4 players.', players: '2-4 players', tag1: 'Strategy', title: 'Dots & Boxes', play: '🎮 Play now', coming: 'COMING SOON' },
    },
    de: {
      pm:        { desc: 'Klassisches Wortspiel online. Trage Länder, Städte, Tiere und mehr mit einem zufälligen Buchstaben ein — schneller als die anderen!', players: '2-12 Spieler', tag1: 'Wissen', play: '🎮 Jetzt spielen', coming: 'DEMNÄCHST' },
      taboo:     { desc: 'Teamspiel! Beschreibe Wörter ohne verbotene — dein Team rät, der gegnerische Schiedsrichter passt auf. Min. 4 Spieler.', players: '4-12 Spieler', tag1: 'Teams', play: '🎮 Jetzt spielen', coming: 'DEMNÄCHST' },
      twotruth:  { desc: 'Sage zwei Wahrheiten und eine Lüge über dich. Alle stimmen ab, welche die Lüge ist!', players: '3-20 Spieler', tag1: 'Kennenlernen', play: '🎮 Jetzt spielen', coming: 'DEMNÄCHST' },
      dots:      { desc: 'Klassisches Strategiespiel! Verbinde Punkte mit Linien und beanspruche Felder. Wer die meisten Felder hat, gewinnt! 2-4 Spieler.', players: '2-4 Spieler', tag1: 'Strategie', title: 'Punkte & Linien', play: '🎮 Jetzt spielen', coming: 'DEMNÄCHST' },
    },
    fr: {
      pm:        { desc: 'Jeu de mots classique en ligne. Remplissez pays, villes, animaux et plus avec une lettre aléatoire — plus vite que les autres!', players: '2-12 joueurs', tag1: 'Culture', play: '🎮 Jouer maintenant', coming: 'BIENTÔT' },
      taboo:     { desc: 'Jeu en équipes! Décrivez des mots sans les interdits — votre équipe devine, l\'arbitre adverse surveille. Min. 4 joueurs.', players: '4-12 joueurs', tag1: 'Équipes', play: '🎮 Jouer maintenant', coming: 'BIENTÔT' },
      twotruth:  { desc: 'Dites deux vérités et un mensonge sur vous. Tout le monde vote lequel est le mensonge!', players: '3-20 joueurs', tag1: 'Brise-glace', play: '🎮 Jouer maintenant', coming: 'BIENTÔT' },
      dots:      { desc: 'Jeu de stratégie classique! Tracez des lignes entre les points et réclamez des cases. Le plus de cases gagne! 2-4 joueurs.', players: '2-4 joueurs', tag1: 'Stratégie', title: 'Points & Lignes', play: '🎮 Jouer maintenant', coming: 'BIENTÔT' },
    },
    es: {
      pm:        { desc: 'Juego de palabras clásico online. Rellena países, ciudades, animales y más con una letra aleatoria — ¡más rápido que los demás!', players: '2-12 jugadores', tag1: 'Conocimiento', play: '🎮 Jugar ahora', coming: 'PRÓXIMAMENTE' },
      taboo:     { desc: '¡Juego en equipos! Describe palabras sin las prohibidas — tu equipo adivina, el árbitro contrario vigila. Mín. 4 jugadores.', players: '4-12 jugadores', tag1: 'Equipos', play: '🎮 Jugar ahora', coming: 'PRÓXIMAMENTE' },
      twotruth:  { desc: 'Di dos verdades y una mentira sobre ti. ¡Todos votan cuál es la mentira!', players: '3-20 jugadores', tag1: 'Integración', play: '🎮 Jugar ahora', coming: 'PRÓXIMAMENTE' },
      dots:      { desc: '¡Juego de estrategia clásico! Dibuja líneas entre puntos y reclama casillas. ¡El que tenga más casillas gana! 2-4 jugadores.', players: '2-4 jugadores', tag1: 'Estrategia', title: 'Puntos & Líneas', play: '🎮 Jugar ahora', coming: 'PRÓXIMAMENTE' },
    },
  };

  var T = {
    pl: { title: 'Darmowe Gry Online', subtitle: 'Gry multiplayer dla znajomych, rodziny i zespołów · Za darmo · Dla wszystkich', back: '← Wróć do strony głównej' },
    en: { title: 'Free Games Online',  subtitle: 'Free multiplayer games for friends, family & teams · No registration · For everyone', back: '← Back to home' },
    de: { title: 'Kostenlose Spiele',  subtitle: 'Multiplayer-Spiele für Freunde, Familie & Teams · Kostenlos · Für alle', back: '← Zurück zur Startseite' },
    fr: { title: 'Jeux Gratuits',      subtitle: 'Jeux multijoueur pour amis, famille & équipes · Gratuit · Pour tous', back: "← Retour à l'accueil" },
    es: { title: 'Juegos Gratis',      subtitle: 'Juegos multijugador para amigos, familia y equipos · Gratis · Para todos', back: '← Volver al inicio' },
  };
  var LANGS = [
    { code: 'pl', label: '🇵🇱 PL' },
    { code: 'en', label: '🇬🇧 EN' },
    { code: 'de', label: '🇩🇪 DE' },
    { code: 'fr', label: '🇫🇷 FR' },
    { code: 'es', label: '🇪🇸 ES' },
  ];

  var params = new URLSearchParams(window.location.search);
  var lang = params.get('lang');
  if (!lang) {
    // Fall back to browser language if no param (e.g. direct navigation)
    var browserLang = (navigator.language || '').toLowerCase().slice(0, 2);
    var supported = ['pl', 'en', 'de', 'fr', 'es'];
    lang = supported.indexOf(browserLang) >= 0 ? browserLang : 'pl';
  }
  if (!T[lang]) lang = 'pl';

  function renderCards(l) {
    var g = GAMES[l] || GAMES['pl'];
    document.getElementById('games-grid').innerHTML =
      card('/', '🌍', 'Państwa-Miasta', g.pm.desc,   g.pm.players,   'PL/EN/DE/FR/ES', g.pm.tag1,   false, g.pm.play,   l) +
      card('/taboo', '🎭', 'Tabu',       g.taboo.desc, g.taboo.players,'PL/EN',          g.taboo.tag1,false, g.taboo.play,l) +
      card('/twotruth', '🤥', '2 Truths 1 Lie', g.twotruth.desc, g.twotruth.players, 'PL/EN', g.twotruth.tag1, false, g.twotruth.play, l) +
      card('/dots', '🔵', g.dots.title || 'Dots & Boxes', g.dots.desc, g.dots.players, '', g.dots.tag1, false, g.dots.play, l);
  }

  function card(href, icon, title, desc, players, lang_tag, tag1, comingSoon, btnLabel, l) {
    var wrap_open  = comingSoon ? '<div class="game-card coming-soon">' : '<a href="' + href + '?lang=' + l + '" class="game-card">';
    var wrap_close = comingSoon ? '</div>' : '</a>';
    var tags = '<span class="game-tag">' + players + '</span><span class="game-tag">' + tag1 + '</span>' + (lang_tag ? '<span class="game-tag">' + lang_tag + '</span>' : '');
    var btn = comingSoon
      ? '<span class="coming-badge">' + btnLabel + '</span>'
      : '<span class="game-card-btn">' + btnLabel + '</span>';
    return wrap_open +
      '<div class="game-card-icon">' + icon + '</div>' +
      '<div class="game-card-title">' + title + '</div>' +
      '<div class="game-card-desc">' + desc + '</div>' +
      '<div class="game-card-tags">' + tags + '</div>' +
      btn +
      wrap_close;
  }

  function applyLang(l) {
    lang = l;
    var t = T[l] || T['pl'];
    document.getElementById('hub-title').textContent = t.title;
    document.getElementById('hub-subtitle').textContent = t.subtitle;
    var backLink = document.getElementById('hub-back-link');
    backLink.textContent = t.back;
    backLink.href = '/?lang=' + l;
    document.querySelectorAll('.hub-lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === l);
    });
    renderCards(l);
    history.replaceState(null, '', '/games?lang=' + l);
    if (window.hubRerenderRooms) window.hubRerenderRooms();
  }

  // Build lang bar
  var bar = document.createElement('div');
  bar.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-bottom:8px;';
  LANGS.forEach(function(lng) {
    var btn = document.createElement('button');
    btn.className = 'hub-lang-btn nav-home-btn';
    btn.dataset.lang = lng.code;
    btn.textContent = lng.label;
    btn.onclick = function() { applyLang(lng.code); };
    bar.appendChild(btn);
  });
  document.querySelector('.container').insertBefore(bar, document.querySelector('.container').firstChild);

  applyLang(lang);
})();
</script>
<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  var hubSocket = io();
  var knownCodes = {};

  var LIVE_LABELS = {
    pl: { title: 'Otwarte pokoje na żywo', empty: 'Brak otwartych pokoi. Stwórz pierwszy!', join: 'Dołącz', private: '🔒 Prywatny', players: 'graczy', createdPrivate: 'stworzył prywatny pokój' },
    en: { title: 'Live Open Rooms',        empty: 'No open rooms right now. Create one!',  join: 'Join',   private: '🔒 Private',   players: 'players', createdPrivate: 'created a private room' },
    de: { title: 'Offene Räume live',      empty: 'Keine offenen Räume. Erstelle einen!',  join: 'Beitreten', private: '🔒 Privat', players: 'Spieler', createdPrivate: 'hat einen privaten Raum erstellt' },
    fr: { title: 'Salles ouvertes en live',empty: 'Aucune salle ouverte. Créez-en une !',  join: 'Rejoindre', private: '🔒 Privé',  players: 'joueurs', createdPrivate: 'a créé une salle privée' },
    es: { title: 'Salas abiertas en vivo', empty: 'Sin salas abiertas. ¡Crea una!',        join: 'Unirse',    private: '🔒 Privado', players: 'jugadores', createdPrivate: 'creó una sala privada' },
  };

  hubSocket.on('connect', function() {
    hubSocket.emit('hub_watch');
  });

  hubSocket.on('hub_rooms', function(rooms) {
    renderRooms(rooms);
  });

  function renderRooms(rooms) {
    var currentLang = (typeof lang !== 'undefined' ? lang : 'en') || 'en';
    var ll = LIVE_LABELS[currentLang] || LIVE_LABELS['en'];

    // Update section title
    var titleEl = document.getElementById('hub-live-title-text');
    if (titleEl) titleEl.textContent = ll.title;

    var list  = document.getElementById('hub-rooms-list');
    var empty = document.getElementById('hub-empty-msg');
    if (!list) return;

    // Separate open vs private
    var openRooms    = rooms.filter(function(r) { return r.isPublic; });
    var privateRooms = rooms.filter(function(r) { return !r.isPublic; });

    if (openRooms.length === 0 && privateRooms.length === 0) {
      list.innerHTML = '<div class="hub-empty-rooms">' + ll.empty + '</div>';
      return;
    }

    var html = '';

    // Open rooms first
    openRooms.forEach(function(room) {
      var isNew = !knownCodes[room.code];
      knownCodes[room.code] = true;
      html +=
        '<div class="hub-room-card' + (isNew ? ' new-room' : '') + '">' +
          '<div class="hub-room-icon">' + room.gameIcon + '</div>' +
          '<div class="hub-room-info">' +
            '<div class="hub-room-game">' + room.gameName + '</div>' +
            '<div class="hub-room-meta">' +
              room.hostName + ' · ' +
              room.players + '/' + room.maxPlayers + ' ' + ll.players +
              (room.lang ? ' · ' + room.lang.toUpperCase() : '') +
            '</div>' +
          '</div>' +
          '<span class="hub-room-players">' + room.players + '/' + room.maxPlayers + '</span>' +
          '<div class="hub-room-code">' + room.code + '</div>' +
          '<a href="' + room.gameSlug + '?join=' + room.code + '" class="hub-room-join-btn">' + ll.join + '</a>' +
        '</div>';
    });

    // Private rooms (masked, no join button)
    if (privateRooms.length > 0) {
      privateRooms.forEach(function(room) {
        html +=
          '<div class="hub-room-card">' +
            '<div class="hub-room-icon">' + room.gameIcon + '</div>' +
            '<div class="hub-room-info">' +
              '<div class="hub-room-game">' + room.gameName + '</div>' +
              '<div class="hub-room-meta">' + room.hostMasked + ' ' + (ll.createdPrivate || 'created a private room') + '</div>' +
            '</div>' +
            '<span class="hub-room-private">' + ll.private + '</span>' +
          '</div>';
      });
    }

    list.innerHTML = html;
  }

  // Re-render when language changes (hub applyLang calls this)
  window.hubRerenderRooms = function() {
    hubSocket.emit('hub_watch'); // re-request to trigger re-render
  };
})();
