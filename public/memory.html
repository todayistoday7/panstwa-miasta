<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Game Online — Free Multiplayer | panstwamiastagra.com</title>
<meta name="description" content="Play Memory card matching game online free! 2-6 players, multiple themes. No signup needed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">

<style>
/* ── MEMORY-SPECIFIC STYLES ── */
.mem-board { display:grid; gap:8px; padding:8px 16px; max-width:520px; width:100%; margin:0 auto; }
.mem-board.size-12 { grid-template-columns:repeat(3,1fr); }
.mem-board.size-16 { grid-template-columns:repeat(4,1fr); }
.mem-board.size-20 { grid-template-columns:repeat(4,1fr); }

.mem-card-wrap { aspect-ratio:1; perspective:600px; }
.mem-card { width:100%; height:100%; position:relative; cursor:pointer; transform-style:preserve-3d; transition:transform 0.4s ease; }
.mem-card.flipped { transform:rotateY(180deg); }
.mem-card.matched { transform:rotateY(180deg); pointer-events:none; }
.mem-card.matched .mem-back { opacity:0.4; }
.mem-card.wrong .mem-back { border-color:var(--danger); }

.mem-face { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:14px;
  display:flex; align-items:center; justify-content:center; border:2px solid var(--border); }
.mem-front { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
.mem-front::after { content:'?'; font-family:'Bebas Neue',sans-serif; font-size:32px; color:rgba(255,255,255,0.4); }
.mem-back { background:var(--card); transform:rotateY(180deg); font-size:clamp(28px,8vw,48px); }

@keyframes mem-shake { 0%,100%{transform:rotateY(180deg) translateX(0)} 25%{transform:rotateY(180deg) translateX(-5px)} 75%{transform:rotateY(180deg) translateX(5px)} }
@keyframes mem-pop { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.1)} 100%{transform:rotateY(180deg) scale(1)} }
.mem-card.wrong .mem-back { animation:mem-shake 0.4s ease; }
.mem-card.matched .mem-back { animation:mem-pop 0.3s ease; }

.mem-turn-bar { max-width:520px; width:100%; margin:0 auto; padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.mem-player-pill { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:900; border:2px solid var(--border);
  background:var(--card); color:var(--muted); transition:all 0.3s; }
.mem-player-pill.active { border-color:var(--accent); background:rgba(255,107,53,0.1); color:var(--accent); animation:pulse-pill 1.5s ease infinite; }
.mem-player-pill .pill-score { font-family:'Bebas Neue',sans-serif; margin-left:6px; font-size:16px; letter-spacing:1px; }

@keyframes pulse-pill { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.3)} 50%{box-shadow:0 0 0 6px rgba(255,107,53,0)} }

.mem-game-info { max-width:520px; width:100%; padding:4px 16px; display:flex; justify-content:space-between; align-items:center; }
.mem-pairs-left { font-size:13px; font-weight:700; color:var(--muted); }
.mem-turn-label { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--accent2); }

/* ── THEME / SIZE SELECTORS IN LOBBY ── */
.mem-theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0 16px; }
.mem-theme-btn { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 8px; text-align:center;
  cursor:pointer; transition:all 0.2s; font-size:12px; font-weight:700; color:var(--muted); }
.mem-theme-btn:hover { border-color:var(--accent); }
.mem-theme-btn.active { border-color:var(--accent); background:rgba(255,107,53,0.1); color:var(--accent); }
.mem-theme-btn .tp { font-size:18px; display:block; margin-bottom:2px; letter-spacing:2px; }

.mem-size-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0 16px; }
.mem-size-btn { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;
  cursor:pointer; transition:all 0.2s; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--muted); }
.mem-size-btn:hover { border-color:var(--accent); }
.mem-size-btn.active { border-color:var(--accent); background:rgba(255,107,53,0.1); color:var(--accent); }
.mem-size-btn span { display:block; font-family:'Nunito',sans-serif; font-size:11px; font-weight:700; }

/* ── FINAL SCREEN ── */
.mem-final-players { max-width:400px; margin:0 auto 20px; }
.mem-final-row { display:flex; justify-content:space-between; align-items:center; padding:12px 16px;
  background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; }
.mem-final-row.winner { border-color:var(--accent2); background:rgba(255,209,102,0.08); }
.mem-final-name { font-weight:900; font-size:15px; }
.mem-final-score { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:var(--accent2); }
</style>
</head>
<body>
<div class="container">

<!-- ═══ HOME SCREEN ═══ -->
<div class="screen active" id="screen-home">
  <div class="home-box">
    <h1 class="game-title" style="font-size:clamp(36px,10vw,56px);">🧠 MEMORY</h1>
    <p class="game-subtitle" id="lbl-subtitle">Find matching pairs — multiplayer edition</p>

    <div class="form-group">
      <label class="form-label" id="lbl-name">Your Name</label>
      <input class="input" id="inp-name" maxlength="16" placeholder="Enter name..." autocomplete="off">
    </div>
    <button class="btn" id="btn-create" onclick="createRoom()">🧠 <span id="lbl-create">Create Room</span></button>

    <div class="divider"><span id="lbl-or">or join existing</span></div>

    <div class="form-group">
      <label class="form-label" id="lbl-code">Room Code</label>
      <input class="input" id="inp-code" maxlength="5" placeholder="e.g. MABCD" autocomplete="off" style="text-transform:uppercase;">
    </div>
    <button class="btn secondary" id="btn-join" onclick="joinRoom()">🚪 <span id="lbl-join">Join Room</span></button>

    <p class="error-msg" id="error-msg" style="display:none;"></p>
  </div>
</div>

<!-- ═══ LOBBY SCREEN ═══ -->
<div class="screen" id="screen-lobby">
  <div class="home-box" style="max-width:480px;">
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent2);text-align:center;">MEMORY LOBBY</h2>
    <div style="text-align:center;margin-bottom:16px;">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:var(--text);" id="lobby-code">-----</span>
      <br><button class="btn share-btn" onclick="shareRoom()" style="margin-top:8px;">📤 <span id="lbl-share-room">Share Room</span></button>
    </div>

    <!-- Player warning -->
    <div id="lobby-warning" style="text-align:center;padding:10px 14px;background:rgba(255,209,102,0.08);border:1px solid rgba(255,209,102,0.3);border-radius:10px;font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:12px;">
      <span id="lbl-waiting">Waiting for players...</span> <span id="lobby-player-count">1/6</span>
    </div>

    <!-- Players list -->
    <div id="lobby-players" style="margin-bottom:16px;"></div>

    <!-- Settings (host only) -->
    <div id="lobby-settings">
      <p style="font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;" id="lbl-theme">Theme</p>
      <div class="mem-theme-grid" id="theme-grid"></div>

      <p style="font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;" id="lbl-board-size">Board Size</p>
      <div class="mem-size-grid" id="size-grid">
        <button class="mem-size-btn" data-size="12" onclick="setSize(12,this)">3×4<span>12 cards</span></button>
        <button class="mem-size-btn active" data-size="16" onclick="setSize(16,this)">4×4<span>16 cards</span></button>
        <button class="mem-size-btn" data-size="20" onclick="setSize(20,this)">4×5<span>20 cards</span></button>
      </div>
    </div>

    <button class="btn" id="btn-start" onclick="startGame()" style="width:100%;margin-top:12px;">🚀 <span id="lbl-start">Start Game</span></button>
    <button class="btn secondary" onclick="leaveRoom()" style="width:100%;margin-top:8px;">🚪 <span id="lbl-leave">Leave Room</span></button>
  </div>
</div>

<!-- ═══ PLAYING SCREEN ═══ -->
<div class="screen" id="screen-playing">
  <div class="mem-turn-bar" id="turn-bar"></div>
  <div class="mem-game-info">
    <span class="mem-pairs-left" id="pairs-info">0/0 pairs</span>
    <span class="mem-turn-label" id="turn-label">Your turn!</span>
  </div>
  <div class="mem-board" id="board"></div>
</div>

<!-- ═══ FINAL SCREEN ═══ -->
<div class="screen" id="screen-final">
  <div style="max-width:420px;margin:0 auto;padding:20px 16px;text-align:center;">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;" id="lbl-game-over">GAME OVER</h1>
    <div style="font-size:56px;margin:12px 0;" id="final-emoji">🏆</div>
    <div class="mem-final-players" id="final-players"></div>
    <button class="btn" onclick="playAgain()" style="margin:8px;" id="btn-play-again">🔄 <span id="lbl-play-again">Play Again</span></button>
    <button class="btn secondary" onclick="goHome()" style="margin:8px;">🏠 <span id="lbl-home">Home</span></button>
  </div>
  <div id="other-games-strip"></div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/shared.js"></script>
<script>
// ═══════════════════════════════════════════════
// MEMORY CLIENT
// ═══════════════════════════════════════════════
const socket = io();
const _forceLang = window._forceLang;
let roomCode = null;
let myId = null;
let isHost = false;
let currentState = null;

const THEME_META = {
  animals: { label:'Animals', labelPl:'Zwierzęta', labelDe:'Tiere', labelSv:'Djur', preview:'🐶🐱🦁' },
  food:    { label:'Food',    labelPl:'Jedzenie',  labelDe:'Essen', labelSv:'Mat',  preview:'🍕🍦🍎' },
  nature:  { label:'Nature',  labelPl:'Natura',    labelDe:'Natur', labelSv:'Natur',preview:'🌸🌊🌈' },
  travel:  { label:'Travel',  labelPl:'Podróże',   labelDe:'Reise', labelSv:'Resor',preview:'✈️🚀🏰' },
  sports:  { label:'Sports',  labelPl:'Sport',     labelDe:'Sport', labelSv:'Sport',preview:'⚽🏀🎾' },
  flags:   { label:'Flags',   labelPl:'Flagi',     labelDe:'Flaggen',labelSv:'Flaggor',preview:'🇵🇱🇬🇧🇩🇪' },
};

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── PRE-FILL JOIN CODE FROM URL ──
(function() {
  const params = new URLSearchParams(window.location.search);
  const joinCode = params.get('join');
  if (joinCode) document.getElementById('inp-code').value = joinCode.toUpperCase();
  // Restore name from session
  const saved = sessionStorage.getItem('mem_name');
  if (saved) document.getElementById('inp-name').value = saved;
})();

// ── ACTIONS ──
function getName() {
  const n = document.getElementById('inp-name').value.trim();
  if (n) sessionStorage.setItem('mem_name', n);
  return n;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function createRoom() {
  const name = getName();
  if (!name) { showError('Please enter your name.'); return; }
  socket.emit('mem_create', { name, settings: { boardSize: 16, theme: 'animals' } });
}

function joinRoom() {
  const name = getName();
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (!name) { showError('Please enter your name.'); return; }
  if (!code) { showError('Please enter a room code.'); return; }
  socket.emit('mem_join', { code, name });
}

function shareRoom() {
  const url = window.location.origin + window.location.pathname + '?join=' + roomCode;
  if (navigator.share) {
    navigator.share({ title: 'Memory Game', text: 'Join my Memory game!', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-btn');
      if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.innerHTML = '📤 <span>Share Room</span>', 2000); }
    });
  }
}

function leaveRoom() {
  if (roomCode) socket.emit('mem_leave', { code: roomCode });
  roomCode = null;
  showScreen('screen-home');
}

function goHome() {
  roomCode = null;
  showScreen('screen-home');
}

function startGame() {
  if (!roomCode) return;
  socket.emit('mem_start', { code: roomCode });
}

function playAgain() {
  if (!roomCode) return;
  socket.emit('mem_play_again', { code: roomCode });
}

function flipCard(index) {
  if (!roomCode || !currentState) return;
  if (currentState.currentPlayer !== myId) return;
  socket.emit('mem_flip', { code: roomCode, cardIndex: index });
}

// ── SETTINGS (HOST) ──
function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  if (!grid) return;
  const theme = currentState ? currentState.settings.theme : 'animals';
  grid.innerHTML = Object.entries(THEME_META).map(([key, t]) =>
    `<button class="mem-theme-btn ${key===theme?'active':''}" onclick="setTheme('${key}',this)">
      <span class="tp">${t.preview}</span>${t.label}
    </button>`
  ).join('');
}

function setTheme(theme, btn) {
  document.querySelectorAll('.mem-theme-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (roomCode) socket.emit('mem_update_settings', { code: roomCode, settings: { theme } });
}

function setSize(size, btn) {
  document.querySelectorAll('.mem-size-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (roomCode) socket.emit('mem_update_settings', { code: roomCode, settings: { boardSize: size } });
}

// ── SOCKET EVENTS ──
socket.on('connect', () => { myId = socket.id; });

socket.on('mem_room_created', ({ code }) => {
  roomCode = code;
  document.getElementById('lobby-code').textContent = code;
  buildThemeGrid();
  showScreen('screen-lobby');
});

socket.on('mem_error', ({ msg }) => { showError(msg); });

socket.on('mem_state', (state) => {
  currentState = state;
  isHost = state.hostId === myId;

  if (state.phase === 'lobby') {
    renderLobby(state);
  } else if (state.phase === 'playing') {
    renderGame(state);
    showScreen('screen-playing');
  } else if (state.phase === 'final') {
    renderFinal(state);
    showScreen('screen-final');
  }
});

// ── RENDER LOBBY ──
function renderLobby(state) {
  document.getElementById('lobby-code').textContent = state.settings && roomCode ? roomCode : '-----';
  const playerList = document.getElementById('lobby-players');
  playerList.innerHTML = state.players.map(p =>
    `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;">
      <div style="width:12px;height:12px;border-radius:50%;background:${p.color};"></div>
      <span style="font-weight:900;font-size:14px;">${p.name}</span>
      ${p.id === state.hostId ? '<span style="font-size:11px;font-weight:700;color:var(--accent);margin-left:auto;">HOST</span>' : ''}
      ${p.id === myId ? '<span style="font-size:11px;font-weight:700;color:var(--accent2);margin-left:4px;">YOU</span>' : ''}
    </div>`
  ).join('');

  // Player count warning
  const count = state.players.length;
  const el = document.getElementById('lobby-player-count');
  if (el) el.textContent = count + '/' + (state.settings.maxPlayers || 6);
  const warn = document.getElementById('lobby-warning');
  if (warn) {
    if (count >= 2) {
      warn.style.borderColor = 'rgba(6,214,160,0.3)';
      warn.style.background = 'rgba(6,214,160,0.08)';
      warn.style.color = 'var(--success)';
    } else {
      warn.style.borderColor = 'rgba(255,209,102,0.3)';
      warn.style.background = 'rgba(255,209,102,0.08)';
      warn.style.color = 'var(--accent2)';
    }
  }

  // Show/hide host settings
  const settings = document.getElementById('lobby-settings');
  const startBtn = document.getElementById('btn-start');
  if (settings) settings.style.display = isHost ? 'block' : 'none';
  if (startBtn) startBtn.style.display = isHost ? 'block' : 'none';

  // Sync theme/size selection
  if (state.settings) {
    document.querySelectorAll('.mem-theme-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.includes(THEME_META[state.settings.theme]?.label));
    });
    document.querySelectorAll('.mem-size-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.size) === state.settings.boardSize);
    });
  }

  buildThemeGrid();
  showScreen('screen-lobby');
}

// ── RENDER GAME ──
function renderGame(state) {
  // Turn bar
  const turnBar = document.getElementById('turn-bar');
  turnBar.innerHTML = state.players.map(p =>
    `<div class="mem-player-pill ${p.id === state.currentPlayer ? 'active' : ''}" style="border-color:${p.id === state.currentPlayer ? p.color : 'var(--border)'};">
      ${p.name}${p.id === myId ? ' (you)' : ''}
      <span class="pill-score">${p.score}</span>
    </div>`
  ).join('');

  // Turn label
  const turnLabel = document.getElementById('turn-label');
  if (state.currentPlayer === myId) {
    turnLabel.textContent = 'Your turn!';
    turnLabel.style.color = 'var(--accent)';
  } else {
    const cp = state.players.find(p => p.id === state.currentPlayer);
    turnLabel.textContent = (cp ? cp.name : '...') + "'s turn";
    turnLabel.style.color = 'var(--muted)';
  }

  // Pairs info
  document.getElementById('pairs-info').textContent = state.foundPairs + '/' + state.totalPairs + ' pairs';

  // Board
  const board = document.getElementById('board');
  board.className = 'mem-board size-' + (state.board.length);

  board.innerHTML = state.board.map((card, i) => {
    const isFlipped = card.flipped || card.matched;
    const matchClass = card.matched ? ' matched' : '';
    const matchStyle = card.matched && card.matchedBy ? ` style="--match-color:${getPlayerColor(state, card.matchedBy)}"` : '';
    return `<div class="mem-card-wrap">
      <div class="mem-card${isFlipped ? ' flipped' : ''}${matchClass}" onclick="flipCard(${i})"${matchStyle}>
        <div class="mem-face mem-front"></div>
        <div class="mem-face mem-back">${card.emoji || ''}</div>
      </div>
    </div>`;
  }).join('');
}

function getPlayerColor(state, playerId) {
  const p = state.players.find(pl => pl.id === playerId);
  return p ? p.color : 'var(--success)';
}

// ── RENDER FINAL ──
function renderFinal(state) {
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const maxScore = sorted[0]?.score || 0;

  const container = document.getElementById('final-players');
  container.innerHTML = sorted.map((p, i) =>
    `<div class="mem-final-row ${p.score === maxScore ? 'winner' : ''}">
      <span class="mem-final-name">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  '} ${p.name}${p.id === myId ? ' (you)' : ''}</span>
      <span class="mem-final-score">${p.score} pairs</span>
    </div>`
  ).join('');

  // Show play again only for host
  const btn = document.getElementById('btn-play-again');
  if (btn) btn.style.display = isHost ? 'inline-block' : 'none';

  if (typeof renderOtherGames === 'function') renderOtherGames('memory');
}
</script>
</body>
</html>
