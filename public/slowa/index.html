var currentWordLang = 'pl';
var currentWordLetter = 'A';

function setWordLang(l) {
  currentWordLang = l;
  document.querySelectorAll('.lang-tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('href') === '#' + l);
  });
  buildWordLetterStrip();
  showWordLetter('A');
  return false;
}

function getAvailableLetters() {
  return Object.keys(WORDS[currentWordLang] || {}).sort();
}

function buildWordLetterStrip() {
  var allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  var available  = getAvailableLetters();
  var strip = document.getElementById('letter-strip');
  strip.innerHTML = allLetters.map(function(l) {
    var hasData = available.indexOf(l) !== -1;
    return '<a class="letter-btn' +
      (l === currentWordLetter ? ' active' : '') +
      (hasData ? '' : ' no-data') +
      '" onclick="return showWordLetter(\'' + l + '\')" href="#' + l + '">' + l + '</a>';
  }).join('');
}

function showWordLetter(letter) {
  currentWordLetter = letter;

  // Update strip
  document.querySelectorAll('.letter-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('href') === '#' + letter);
  });

  var data = (WORDS[currentWordLang] || {})[letter];
  var display = document.getElementById('letter-display');
  var grid    = document.getElementById('cat-grid');

  if (!data) {
    display.innerHTML = '<div class="letter-big">' + letter + '</div><p class="no-letter-msg">Brak słów na tę literę w wybranym języku.</p>';
    grid.innerHTML = '';
    return false;
  }

  var catCount = Object.keys(data).length;
  var totalWords = Object.values(data).reduce(function(a,b){return a+b.length;},0);
  var hintMap = {
    pl: 'słów w ' + catCount + ' kategoriach — kliknij kategorię żeby odkryć',
    en: 'words across ' + catCount + ' categories — click a category to reveal',
    de: 'Wörter in ' + catCount + ' Kategorien — klicke eine Kategorie zum Aufdecken',
  };

  display.innerHTML =
    '<span class="letter-big">' + letter + '</span>' +
    '<span class="letter-hint">✦ ' + totalWords + ' ' + (hintMap[currentWordLang] || hintMap['en']) + '</span>';

  // Build category cards — all HIDDEN until user clicks reveal
  grid.innerHTML = Object.keys(data).map(function(cat) {
    var words = data[cat];
    var safeId = 'cat-' + letter + '-' + cat.replace(/[^a-zA-Z0-9]/g,'');
    var chipsHtml = words.map(function(w) {
      var isRare = w.endsWith('*');
      var display = isRare ? w.slice(0,-1) : w;
      return '<span class="word-chip' + (isRare ? ' rare' : '') + '">' + display + '</span>';
    }).join('');
    var revealLabel = {pl:'Pokaż',en:'Reveal',de:'Zeigen'}[currentWordLang] || 'Reveal';
    var hideLabel   = {pl:'ukryj',en:'hide',de:'verbergen'}[currentWordLang] || 'hide';
    return '<div class="cat-card" id="' + safeId + '">' +
      '<div class="cat-header" onclick="revealCat(\'' + safeId + '\')">' +
        '<div class="cat-header-left">' +
          '<span class="cat-icon">' + (CAT_ICONS_MAP[cat] || '📌') + '</span>' +
          '<div>' +
            '<div class="cat-name">' + cat.replace(/ [🌍🏙️🐘🌿🙋📦]/u,'') + '</div>' +
            '<div class="cat-count">' + words.length + ' ' + ({pl:'słów',en:'words',de:'Wörter'}[currentWordLang]||'words') + '</div>' +
          '</div>' +
        '</div>' +
        '<span class="reveal-btn">👁 ' + revealLabel + '</span>' +
      '</div>' +
      '<div class="cat-words">' +
        '<div class="word-chips">' + chipsHtml + '</div>' +
        '<span class="hide-btn" onclick="hideCat(\'' + safeId + '\')">' + hideLabel + '</span>' +
      '</div>' +
    '</div>';
  }).join('');

  return false;
}

function revealCat(id) {
  var card = document.getElementById(id);
  if (card && !card.classList.contains('revealed')) {
    card.classList.add('revealed');
  }
}

function hideCat(id) {
  var card = document.getElementById(id);
  if (card) card.classList.remove('revealed');
}

// Init on A
buildWordLetterStrip();
showWordLetter('A');
</script>
<script src="/js/shared.js"></script>
</body>
